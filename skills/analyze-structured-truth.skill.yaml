# Skill specification — template per docs/AGENT_AND_SKILL_ARCHITECTURE.md §4.
# Phase 1B.2 (DEC-0011) implements this deterministic Tier-0 UNDERSTAND
# service; Phase 1B.2.1 (DEC-0012) corrected its lifecycle semantics —
# contradicted claims are retained but inactive, and current truth is a
# validated lineage projection over the complete claim revision set. It is
# NOT the catalog's Tier-2 `detect-contradictions` capability: semantic
# contradiction detection over unrestricted prose remains unimplemented and
# prohibited by the ratified zero-provider policy (DEC-0009) until a
# provider-enablement decision supersedes it.
skill_id: analyze-structured-truth
domain: UNDERSTAND
purpose: >
  Deterministically detect open contradictions and gaps over EXPLICITLY
  structured fact slots: capture a store-authoritative snapshot of the
  canonical workspace/brand claim namespace (src/kernel/claim-snapshot.ts,
  DEC-0013), project it into effective lineage heads
  (src/understand/project-active-claims.ts, DEC-0012), group effective
  claims by fact_key, compare normalized scalar values with exact
  type-sensitive equality, and evaluate required/optional slots against one
  versioned truth profile. Produces a schema-valid truth-analysis artifact
  bound to its claim snapshot (reference + aggregate digest) and recording
  the full lineage partition. Implemented in
  src/understand/analyze-structured-truth.ts.
input_contract: >
  TruthAnalysisInput (src/understand/analyze-structured-truth.ts): one
  truth-profile.schema.json artifact, workspace/brand identity, artifact
  IDs for the produced analysis and snapshot, and an injected clock — plus
  the FileArtifactStore holding the canonical claims. Claim membership
  comes from Artifact Store enumeration (DEC-0013): a caller-supplied
  claims array is rejected at runtime, because a supplied subset is not
  evidence of completeness. Boundary values stay unknown until contract
  validation.
output_contract: truth-analysis.schema.json (plus the bound claim-snapshot.schema.json artifact)
required_context: [workspace, brand_ref, supplied artifacts only — no Second Brain reads]
tools: []          # no OCR, no parsing, no fetching, no network
model_calls: none  # Tier 0 — deterministic code end to end
gateway: not used  # the analyzer never crosses the gateway boundary
fake_adapter: not used  # gateway test infrastructure only, never simulated intelligence (DEC-0011)
model_capability: tier-0 (deterministic; the Tier-2 semantic
  detect-contradictions extension is prohibited by DEC-0009 until a
  provider-enablement decision supersedes it)
deterministic_validations:
  - canonical claim membership is enumerated from the exact workspace/brand
    Artifact Store namespace (DEC-0013): strict fail-closed enumeration
    (symlinked/non-file/non-canonical entries fail the capture instead of
    being skipped), an enumerate-load-enumerate stability check (typed
    snapshot-unstable failure on mid-capture change), and per-claim +
    aggregate sha256 digests binding the snapshot to the exact validated
    contents; a zero-claim namespace is a valid snapshot; legacy
    caller-supplied claims/claim_refs fields are rejected at runtime
  - the truth profile and every claim are contract-valid (schema + semantic)
    before anything is read from them (INV-DET-001)
  - the profile and every claim belong to the analysis brand; cross-brand
    inputs are rejected (INV-DATA-001)
  - duplicate claim artifact IDs are rejected
  - every claim lineage is validated before projection (DEC-0012):
    self-supersession, lineage cycles, dangling predecessors, ambiguous
    forks, conflicting superseded_by metadata, and lifecycle-superseded
    claims whose successor is missing from the complete set all fail
    closed — omission is not resolution, and claim artifacts are immutable
    (a revision is a new artifact linked by supersedes)
  - only EFFECTIVE lineage heads participate in analysis; superseded
    historical revisions and inactive heads (verification contradicted/
    rejected/expired, lifecycle rejected) neither create contradictions nor
    satisfy slots, and every excluded claim is listed explicitly with its
    partition/reason in the produced artifact — a resolved contradiction
    stays closed on re-analysis
  - only claims with explicit fact metadata participate; comparison is exact
    and type-sensitive — string "1" differs from number 1, no case folding,
    no Unicode normalization, no unit conversion, no fuzzy matching
  - single-cardinality slots with two or more distinct normalized values
    produce exactly one open contradiction; identical duplicate values are
    never contradictions; multi slots accumulate without conflict
  - gaps are produced only relative to the supplied truth profile: required
    slots with no eligible effective claim are `missing` (a contradicted
    head is not support), required slots with only unconfirmed/inference
    support are `unverified`, optional absence is not a gap, and an open
    contradiction is never converted into a gap
  - blocking flags are copied from the profile; the analyzer assigns none
  - contradictions are fixed to status "open"; no winner is ever selected
    (INV-HUM-001(3))
  - output ordering is deterministic (code-unit sort); repeated identical
    input produces byte-equivalent output
  - the produced artifact validates against truth-analysis.schema.json before
    it is returned or stored
failure_modes:
  - legacy caller-supplied claims/claim_refs input (typed invalid-input,
    DEC-0013)
  - irregular canonical namespace entry or namespace change during capture
    (typed namespace-violation / snapshot-unstable, DEC-0013)
  - invalid profile or claim artifact (typed validation-failed)
  - cross-brand profile or claim (typed reference-violation /
    namespace-violation)
  - duplicate claim artifact IDs (typed invalid-input)
  - lineage violation — self-supersession, cycle, dangling predecessor,
    ambiguous fork, conflicting superseded_by, or hidden successor (typed
    lineage-violation, DEC-0012)
  - schema rejection of the produced analysis or snapshot (typed
    validation-failed)
retry_rules: none — deterministic code either succeeds or returns a typed
  failure; retrying without changed input cannot change the outcome
human_approval: none inside detection; contradiction resolution and
  inference confirmation are human gates downstream (INV-HUM-001(3)) —
  resolution produces a decision record, never an analyzer output.
  Authoritative resolution is implemented as the authenticated
  fact-resolution loop (DEC-0016, resolve-fact-contradiction.skill.yaml):
  a signed immutable fact-resolution-decision artifact, verified and
  consumed once, deterministically creates the losing claims' contradicted
  revisions. A shape-valid decision or approval artifact is still not
  evidence that a human acted (DEC-0012)
token_budget: {output: 0, max_tool_calls: 0, max_iterations: 1}  # Tier 0: zero model tokens
caching: not applicable (no model calls; deterministic output for identical input)
limitations: >
  Effective claims without structured fact metadata are listed under
  unstructured_claim_refs and are NOT analyzed: they are never keyword-parsed,
  text-compared, silently ignored, or converted into assumptions. Two prose
  statements a human would read as conflicting produce no contradiction here.
  Effective structured claims whose fact_key is not in the profile are listed
  under unprofiled_fact_claim_refs. Absence from the profile is not evidence
  that information is universally required. Claims must be persisted to the
  canonical store before analysis — the analyzer cannot be handed a claim
  array, partial lineages fail closed rather than projecting, and the
  analyzer cannot resolve contradictions — it only keeps human resolutions
  closed once the losing claim's contradicted revision exists.
evaluation: runtime tests in test/analyze-structured-truth.test.ts and
  test/project-active-claims.test.ts —
  profile/claim contract enforcement, exact type-sensitive comparison
  (string-vs-number, case, Unicode composition), single/multi cardinality,
  missing/unverified/optional gap rules, lineage projection (three-version
  chains, contradicted/rejected/expired/lifecycle-rejected inactive heads,
  fail-closed cycles/forks/dangling/hidden-successor/conflicting-metadata
  cases, resolution-loop closure reproduced as a failing test before the
  DEC-0012 correction), explicit partition and unstructured/unprofiled
  listing, brand isolation (analyzer and artifact store), duplicate
  rejection, byte-equivalent determinism, contract validity of the output,
  and proof that no gateway import exists and the Fake Adapter is never
  invoked
