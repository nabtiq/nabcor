# Skill specification — template per docs/AGENT_AND_SKILL_ARCHITECTURE.md §4.
# Phase 1A implements the deterministic compile half of this UNDERSTAND skill;
# Phase 1B.2 (DEC-0011) made the truth-analysis artifact the single
# authoritative input for contradictions and gaps. The catalog's
# model-assisted gap narration (Tier 2) stays unimplemented and prohibited by
# the ratified zero-provider policy (DEC-0009; Q-002 closed as "no provider
# approved") — a future provider requires a superseding provider-enablement
# decision, not an answer to an open question.
skill_id: build-brand-context
domain: UNDERSTAND
purpose: >
  Deterministically compile already structured, already validated truth —
  source, claim, and assumption artifacts plus one validated truth-analysis
  artifact — into a schema-valid Brand Context Package. Compilation of
  structured truth, not natural-language extraction. Implemented in
  src/compile/build-brand-context.ts.
input_contract: >
  BrandContextInput (src/compile/build-brand-context.ts): source.schema.json[],
  assumption.schema.json[], the artifact_id of a persisted
  truth-analysis.schema.json artifact (DEC-0011/DEC-0013 — the analysis and
  its claim snapshot load from the FileArtifactStore by reference; the only
  admissible source of contradictions, gaps, and claim membership), identity
  structures matching brand-context.schema.json shapes, plus workspace
  namespace and a FileContentStore for captured-fragment verification.
  Caller-supplied claims arrays and inline analysis objects are rejected at
  runtime.
output_contract: brand-context.schema.json
required_context: [workspace, brand_ref, supplied artifacts only — no Second Brain reads]
tools: []  # no model call exists or is hidden inside the compiler
model_capability: tier-0 (deterministic; the Tier-2 gap-narration extension is
  prohibited by DEC-0009 until a provider-enablement decision supersedes it)
deterministic_validations:
  - every supplied source/assumption is contract-valid (schema + semantic);
    the analysis, snapshot, and claims load from the canonical store with
    validation and brand-namespace checks on every read
  - stale-analysis protection (DEC-0013): the analysis must be digest-bound
    to its referenced snapshot, and the snapshot must reconcile exactly with
    a fresh capture of the canonical claim namespace — a claim that
    appeared, disappeared, or changed content since analysis fails
    compilation closed with a typed stale-analysis failure (re-analysis
    required); the analyzed claim set must EXACTLY match the canonical set
    (DEC-0011)
  - the package compiles EFFECTIVE current claims only (DEC-0012): claim_refs
    are the analysis's effective_claim_refs (validated lineage heads), and an
    identity/audience/market reference to a superseded, contradicted,
    rejected, or expired claim fails closed; historical revisions stay
    auditable through truth_analysis_ref, and no stored claim is mutated or
    deleted
  - the analysis's declared lineage partition must AGREE with the projection
    re-derived from the supplied complete claim set
    (src/understand/project-active-claims.ts — the single lineage
    implementation): a fabricated or stale analysis whose partitions are
    internally consistent but disagree with the actual claim data (e.g. a
    contradicted claim declared effective, or a hidden supersession) is
    rejected with a typed failure (DEC-0012)
  - caller-supplied contradiction/gap arrays are rejected with a typed failure:
    analysis results cannot be injected, omitted, or independently rewritten,
    and the package records truth_analysis_ref (DEC-0011)
  - all referenced sources, claims, and assumptions exist among the inputs;
    dangling identity/audience/contradiction/mark references are rejected
  - factual claims retain provenance — never model-inference sourced, and every
    claim source_ref is a canonical source:<artifact_id> reference resolving to
    a supplied source artifact ID (INV-FACT-001, DEC-0006); filename-based
    references are rejected, and filename collisions cannot satisfy references
  - code-point fragments (source:<artifact_id>#codepoints=a-b — zero-based
    half-open Unicode code-point offsets, never UTF-16 units or bytes) on
    captured text are bounds-checked and read back through the recorded content
    reference (digest-verified); page fragments on descriptors stay
    structurally valid but not-yet-content-verified (DEC-0007)
  - claims citing quarantined sources are ALWAYS rejected with a typed
    quarantine-fail-closed failure: release requires both a formally named
    independent reviewer and a ratified authenticated approval mechanism,
    neither of which exists (DEC-0007, DEC-0008), so a quarantine-release
    approval on the source artifact is audit metadata and grants no authority
    (INV-SEC-002, INV-HUM-001)
  - inference cannot become verified fact without human verification evidence
    (INV-FACT-002)
  - prompt-only mode admits prompt/brief sources only, so proof points cannot
    be manufactured from evidence that is not there
  - open contradictions pass through visibly from the truth analysis; the
    compiler never resolves or drops them (INV-HUM-001(3))
  - missing information is a gap entry from the truth analysis, never invented
    content
  - provisional is derived (open assumptions or unverified EFFECTIVE claims —
    historical revisions do not count, DEC-0012), never asserted
  - the output package validates against brand-context.schema.json before it is
    returned or stored (INV-DET-001)
failure_modes:
  - invalid supplied artifact or truth analysis (typed validation-failed)
  - caller-supplied contradiction/gap bypass attempt (typed invalid-input)
  - dangling reference, cross-brand input, or analysis claim-coverage mismatch
    (typed reference-violation)
  - schema rejection of the compiled package (typed validation-failed)
retry_rules: none — deterministic; a typed failure requires changed input
human_approval: none inside the compiler; fact conflicts and inference
  confirmations are human gates downstream (INV-HUM-001(3))
token_budget: {output: 0, max_tool_calls: 0, max_iterations: 1}  # Tier 0: no model
caching: not applicable (no model calls; deterministic output for identical input)
evaluation: runtime tests in test/build-brand-context.test.ts and
  test/codepoint-fragments.test.ts — both synthetic modes compile through the
  analyzer-produced truth analysis, unsupported/inference-as-fact/
  dangling-reference/cross-brand inputs are rejected, contradictions stay
  visible, the caller bypass and coverage mismatches are rejected, filename
  collisions cannot satisfy references, code-point fragments are bounds-checked
  against captured content across ASCII/Arabic/supplementary-plane/combining
  characters, and quarantined-source claims always fail closed (no
  caller-supplied approval can compile them)
