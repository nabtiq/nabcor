# Foundation contract verification — schema + semantic layers.
# Scope: contracts/ only. The website production layer (packages/*, apps/demo) has its
# own gates (typecheck, validate-content, test:a11y) and is NOT exercised here because
# contract changes cannot affect it — this workflow exists so Foundation contract
# regressions fail fast and independently. First workflow in this repository.
# Security: no untrusted event data is interpolated anywhere; least-privilege token.
name: foundation-contracts

on:
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/foundation-contracts.yml"
  push:
    branches:
      - "foundation/**"
      - main
    paths:
      - "contracts/**"
      - ".github/workflows/foundation-contracts.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact commit
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node
        # actions/setup-node v4.1.0
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Validate contracts (schema + semantic + fixtures)
        run: node contracts/validate.mjs
