name: validate-foundation

on:
  pull_request:
  push:
    branches: [main, "foundation/**", "phase/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node 20
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: "20"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate contracts, Second Brain, and clean baseline
        run: npm run validate
